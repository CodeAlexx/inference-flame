# Mirror flame-core: route cudarc through the vendored cudarc-pinctx so the
# `install_external_ptr_hook` symbol resolves. Without this patch, building
# inference-flame pulls upstream cudarc 0.11.9 (which lacks the symbol) and
# flame-core/src/external_memory.rs fails to compile.
[patch.crates-io]
cudarc = { path = "../cudarc-pinctx" }
