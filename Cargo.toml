[package]
name = "inference-flame"
version = "0.1.0"
authors = ["Alex"]
edition = "2021"
license = "MIT"
description = "Pure Rust diffusion model inference using flame-core"
# Disable auto-discovery: several src/bin/* files are work-in-progress and
# reference modules that don't exist (motif_video_dit, nucleus_dit,
# qwen3vl_encoder). Auto-discovery would pull them into every `cargo test`
# invocation. We enumerate the working bins / tests / benches manually.
autobins = false
autotests = false
autobenches = false

[dependencies]
flame-core = { path = "../flame-core", default-features = false, features = ["cuda", "bf16_u16", "cudnn", "shared_storage"] }
flame-diffusion = { path = "../flame-diffusion" }
lanpaint-flame = { path = "../lanpaint-flame" }
lycoris-rs = { path = "../eri-lycoris/lycoris-rs" }
cudarc = { version = "0.11.9", default-features = false, features = ["driver", "cublas", "cublaslt", "nvrtc", "cuda-12050", "f16"] }
half = { version = "2.3", features = ["num-traits"] }
serde_json = "1.0"
memmap2 = "0.9"
anyhow = "1.0"
tokenizers = { version = "0.21", default-features = false, features = ["onig"] }
env_logger = "0.10"
rand = "0.8.5"
log = "0.4"
image = "0.24"
# Audio I/O for MagiHuman talking-head conditioning. hound: WAV read/write.
# rubato: Sinc resampling to model-expected 51200 Hz from arbitrary input rate.
hound = "3.5"
rubato = "0.16"

[features]
default = ["cuda", "bf16_u16"]
cuda = []
bf16_u16 = []
# Turbo Flame Phase 1: VMM-backed double-buffered block loader for Klein 9B
# inference. Off by default — enables `src/turbo/`, the
# `klein9b_infer_turbo` binary, and the `turbo_*` test suite.
turbo = []

