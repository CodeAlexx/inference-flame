[package]
name = "inference-flame"
version = "0.1.0"
authors = ["Alex"]
edition = "2021"
license = "MIT"
description = "Pure Rust diffusion model inference using flame-core"

[dependencies]
flame-core = { git = "https://github.com/CodeAlexx/Flame", rev = "c7efeb556157b677cefef7a4af1bc92d8bc5b0b2", default-features = false, features = ["cuda", "bf16_u16", "cudnn", "shared_storage"] }
flame-swap = { path = "flame-swap" }
cudarc = { version = "0.11.9", default-features = false, features = ["driver", "cublas", "cublaslt", "nvrtc", "cuda-12050", "f16"] }
half = { version = "2.3", features = ["num-traits"] }
serde_json = "1.0"
memmap2 = "0.9"
anyhow = "1.0"
tokenizers = { version = "0.21", default-features = false, features = ["onig"] }
env_logger = "0.10"
rand = "0.8.5"
log = "0.4"
image = "0.24"

[features]
default = ["cuda", "bf16_u16"]
cuda = []
bf16_u16 = []

[[bin]]
name = "bench_flame"
path = "bench/bench_flame.rs"

[[bin]]
name = "chroma_infer"
path = "src/bin/chroma_infer.rs"

[[bin]]
name = "chroma_encode"
path = "src/bin/chroma_encode.rs"

[[bin]]
name = "chroma_gen"
path = "src/bin/chroma_gen.rs"

